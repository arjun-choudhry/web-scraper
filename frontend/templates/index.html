<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web to PDF</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        margin: 0;
        padding: 2rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 2.5rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        color: #1a1a2e;
        font-size: 2rem;
        font-weight: 700;
      }
      .subtitle {
        color: #666;
        margin: 0 0 2rem;
        font-size: 0.95rem;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
        color: #333;
        font-weight: 600;
        font-size: 0.9rem;
      }
      .textarea-wrapper {
        position: relative;
        display: flex;
      }
      .line-numbers {
        width: 3rem;
        padding: 1rem 0;
        background: #f8f9fa;
        border: 2px solid #e0e0e0;
        border-right: none;
        border-radius: 8px 0 0 8px;
        text-align: right;
        color: #999;
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px;
        line-height: 1.5;
        user-select: none;
        flex-shrink: 0;
        overflow: hidden;
      }
      textarea {
        flex: 1;
        min-height: 160px;
        padding: 1rem;
        border: 2px solid #e0e0e0;
        border-radius: 0 8px 8px 0;
        font-size: 14px;
        font-family: 'Courier New', Courier, monospace;
        resize: vertical;
        transition: border-color 0.2s;
        line-height: 1.5;
        white-space: pre;
        overflow-wrap: normal;
        overflow-x: auto;
        margin-left: -2px; /* Compensate for line numbers border */
      }
      textarea:focus {
        outline: none;
        border-color: #667eea;
      }
      button {
        margin-top: 1.5rem;
        padding: 0.8rem 2rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        width: 100%;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
      }
      button:active {
        transform: translateY(0);
      }
      .auth-section {
        margin: 1.5rem 0;
        padding: 1.25rem;
        background: #f8f9fa;
        border-radius: 10px;
        border: 1px solid #e9ecef;
      }
      .auth-section strong {
        display: block;
        margin-bottom: 0.75rem;
        color: #333;
      }
      .auth-options {
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
        margin-bottom: 0.75rem;
      }
      .auth-options label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        color: #555;
        font-size: 0.9rem;
      }
      .auth-options input[type="radio"] {
        accent-color: #667eea;
      }
      .auth-section input[type="text"] {
        width: 100%;
        padding: 0.6rem;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        margin-top: 0.25rem;
        font-size: 0.9rem;
      }
      .auth-section input[type="text"]:focus {
        outline: none;
        border-color: #667eea;
      }
      #cookieOptions, #popupOptions {
        margin-top: 0.75rem;
      }
      #status {
        margin-top: 1.5rem;
        padding: 1rem;
        background: #f8f9fa;
        border-radius: 8px;
        border-left: 4px solid #667eea;
      }
      #status p {
        margin: 0.5rem 0;
        color: #333;
      }
      #status strong {
        color: #1a1a2e;
      }
      .success { color: #157347; }
      .error { color: #bb2d3b; }
      .result-row {
        margin: 0.5rem 0;
        padding: 0.75rem;
        background: #f8f9fa;
        border-radius: 6px;
        font-size: 0.9rem;
      }
      .result-row a {
        color: #667eea;
        text-decoration: none;
      }
      .result-row a:hover {
        text-decoration: underline;
      }
      .muted { color: #666; }
      .current-processing {
        margin-top: 1rem;
        padding: 0.75rem;
        background: #e7f3ff;
        border-radius: 6px;
        border-left: 4px solid #2196f3;
        font-size: 0.9rem;
      }
      .current-processing strong {
        color: #1565c0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Webpage to PDF</h1>
      <p class="subtitle">Convert any webpage to a beautifully formatted PDF. One URL returns a PDF, multiple URLs return a ZIP.</p>

      <label for="urls">URLs</label>
      <div class="textarea-wrapper">
        <div class="line-numbers" id="lineNumbers">1</div>
        <textarea id="urls" placeholder="https://example.com&#10;https://example.org"></textarea>
      </div>
      <br />

      <div class="auth-section">
        <strong>Authentication</strong>
        <div class="auth-options">
          <label><input type="radio" name="authType" value="none" checked> None</label>
          <label><input type="radio" name="authType" value="cookie"> Cookie File</label>
          <label><input type="radio" name="authType" value="popup"> Popup Auth</label>
          <label><input type="radio" name="authType" value="browser_session"> Browser Session</label>
        </div>
        <div id="cookieOptions">
          <label for="authCookieFile">Cookie File Path</label>
          <input type="text" id="authCookieFile" placeholder="auth_cookies.json">
        </div>
        <div id="popupOptions" style="display: none;">
          <label for="authPopupUrl">Popup URL</label>
          <input type="text" id="authPopupUrl" placeholder="https://example.com/login">
        </div>
      </div>

      <button id="submitBtn">Convert to PDF</button>

      <div id="status"></div>
      <div id="results"></div>
      <div id="currentProcessing" class="current-processing" style="display: none;"></div>
    </div>

    <script>
      const submitBtn = document.getElementById("submitBtn");
      const statusEl = document.getElementById("status");
      const resultsEl = document.getElementById("results");
      const urlsEl = document.getElementById("urls");
      const lineNumbersEl = document.getElementById("lineNumbers");
      const currentProcessingEl = document.getElementById("currentProcessing");
      const authTypeRadios = document.querySelectorAll('input[name="authType"]');
      const cookieOptions = document.getElementById("cookieOptions");
      const popupOptions = document.getElementById("popupOptions");
      const authCookieFileEl = document.getElementById("authCookieFile");
      const authPopupUrlEl = document.getElementById("authPopupUrl");

      // Update line numbers when textarea changes
      function updateLineNumbers() {
        const lines = urlsEl.value.split('\n').length;
        lineNumbersEl.innerHTML = Array(lines).fill(0).map((_, i) => i + 1).join('<br>');
      }

      // Load saved state from localStorage
      function loadState() {
        const savedUrls = localStorage.getItem('urls');
        const savedAuthType = localStorage.getItem('authType');
        const savedCookieFile = localStorage.getItem('authCookieFile');
        const savedPopupUrl = localStorage.getItem('authPopupUrl');

        if (savedUrls) urlsEl.value = savedUrls;
        if (savedAuthType) {
          const radio = document.querySelector(`input[name="authType"][value="${savedAuthType}"]`);
          if (radio) radio.checked = true;
        }
        if (savedCookieFile) authCookieFileEl.value = savedCookieFile;
        if (savedPopupUrl) authPopupUrlEl.value = savedPopupUrl;

        // Show/hide auth options based on saved selection
        updateAuthOptions();
        updateLineNumbers();
      }

      // Save state to localStorage
      function saveState() {
        localStorage.setItem('urls', urlsEl.value);
        localStorage.setItem('authType', document.querySelector('input[name="authType"]:checked').value);
        localStorage.setItem('authCookieFile', authCookieFileEl.value);
        localStorage.setItem('authPopupUrl', authPopupUrlEl.value);
      }

      // Show/hide auth options based on selection
      function updateAuthOptions() {
        const authType = document.querySelector('input[name="authType"]:checked').value;
        if (authType === "cookie") {
          cookieOptions.style.display = "block";
          popupOptions.style.display = "none";
        } else if (authType === "popup") {
          cookieOptions.style.display = "none";
          popupOptions.style.display = "block";
        } else {
          cookieOptions.style.display = "none";
          popupOptions.style.display = "none";
        }
      }

      authTypeRadios.forEach(radio => {
        radio.addEventListener("change", () => {
          updateAuthOptions();
          saveState();
        });
      });

      urlsEl.addEventListener("input", () => {
        saveState();
        updateLineNumbers();
      });
      authCookieFileEl.addEventListener("input", saveState);
      authPopupUrlEl.addEventListener("input", saveState);

      // Load state on page load
      loadState();

      async function pollJob(jobId) {
        while (true) {
          const res = await fetch(`/api/jobs/${jobId}`);
          const data = await res.json();
          statusEl.innerHTML = `<p><strong>Status:</strong> ${data.status}</p>`;

          if (data.results?.length) {
            resultsEl.innerHTML = data.results.map((item) => {
              const cls = item.status === "success" ? "success" : "error";
              const msg = item.status === "success"
                ? `${item.url} → ${item.filename}`
                : `${item.url} → ${item.error}`;
              return `<div class="result-row ${cls}">${msg}</div>`;
            }).join("");
          }

          if (data.status === "completed") {
            const label = data.download_type === "pdf" ? "Download PDF" : "Download ZIP";
            statusEl.innerHTML += `<p><a href="${data.download_path}">${label}</a></p>`;
            currentProcessingEl.style.display = "none";
            return;
          }
          if (data.status === "failed") {
            statusEl.innerHTML += `<p class="error">${data.error || "Job failed."}</p>`;
            currentProcessingEl.style.display = "none";
            return;
          }

          // Update current processing status
          if (data.results?.length) {
            const completed = data.results.filter(r => r.status === "success" && r.filename).length;
            const total = data.results.length;
            // Show the last result as processing if it doesn't have a filename yet
            const lastResult = data.results[data.results.length - 1];
            if (lastResult && lastResult.status === "success" && !lastResult.filename) {
              currentProcessingEl.innerHTML = `<strong>Processing:</strong> ${lastResult.url}`;
              currentProcessingEl.style.display = "block";
            } else if (completed < total) {
              currentProcessingEl.innerHTML = `<strong>Processing:</strong> ${completed}/${total} URLs completed`;
              currentProcessingEl.style.display = "block";
            } else {
              currentProcessingEl.style.display = "none";
            }
          }

          await new Promise((resolve) => setTimeout(resolve, 1500));
        }
      }

      submitBtn.addEventListener("click", async () => {
        const urlText = urlsEl.value || "";
        const authType = document.querySelector('input[name="authType"]:checked').value;
        const authCookieFile = authCookieFileEl.value || null;
        const authPopupUrl = authPopupUrlEl.value || null;

        // Save current state
        saveState();

        statusEl.textContent = "Submitting job...";
        resultsEl.textContent = "";
        currentProcessingEl.style.display = "none";

        const res = await fetch("/api/convert", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            urls: [],
            url_text: urlText,
            auth_type: authType,
            auth_cookie_file: authCookieFile,
            auth_popup_url: authPopupUrl
          })
        });

        if (!res.ok) {
          const err = await res.json();
          statusEl.innerHTML = `<p class="error">${err.detail || "Request failed."}</p>`;
          return;
        }

        const data = await res.json();
        await pollJob(data.job_id);
      });
    </script>
  </body>
  </html>
